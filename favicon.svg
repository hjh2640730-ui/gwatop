<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#a855f7" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="none" stroke="url(#accent)" stroke-width="5" opacity="0.35"/>

  <!-- G letter — Pretendard Variable, weight 900 -->
  <text
    x="256" y="358"
    font-family="'Pretendard Variable', Pretendard, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-size="310"
    font-weight="900"
    letter-spacing="-4"
    text-anchor="middle"
    fill="url(#accent)"
    filter="url(#glow)"
  >G</text>
</svg>
